name: move closed issue to done

on:
  issues:
    types: [closed]

permissions:
  contents: read
  issues: read

jobs:
  move:
    if: github.repository == 'eventbalancer/agent-quorum'
    name: Move closed issue to Done
    uses: ./.github/workflows/update-project-status.yml
    with:
      done_option_id: a4916c89
      issue_number: ${{ github.event.issue.number }}
      project_id: PVT_kwHOAVA9Gc4Baj8g
      repository_name: ${{ github.event.repository.name }}
      repository_owner: ${{ github.repository_owner }}
      status_field_id: PVTSSF_lAHOAVA9Gc4Baj8gzhVarVY
    secrets:
      PROJECTS_TOKEN: ${{ secrets.PROJECTS_TOKEN }}
